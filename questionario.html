<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Questionário - Alpha Fitness</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --lime:#b5f23d;
  --white:#fff;
  --muted:rgba(255,255,255,0.6);
  --line:rgba(255,255,255,0.1);
}

body{
  font-family:'DM Sans',sans-serif;
  color:var(--white);
  background:
  linear-gradient(rgba(0,0,0,0.85),rgba(0,0,0,0.95)),
  url('https://images.unsplash.com/photo-1554284126-aa88f22d8b74?w=1800') center/cover;
  min-height:100vh;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  padding:20px 60px;
  display:flex;
  justify-content:space-between;
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}

/* CONTAINER */
.container{
  max-width:700px;
  margin:auto;
  padding:140px 40px 60px;
}

/* TITLES */
h1{
  font-family:'Bebas Neue';
  font-size:60px;
  margin-bottom:10px;
}

.sub{
  color:var(--muted);
  margin-bottom:40px;
}

/* FORM CARD */
.form-box{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--line);
  border-radius:18px;
  padding:30px;
  backdrop-filter:blur(12px);

  opacity:0;
  transform:translateY(40px) scale(0.98);
  transition:.8s cubic-bezier(.16,1,.3,1);
}

.form-box.show{
  opacity:1;
  transform:translateY(0) scale(1);
}

/* INPUT */
.input-group{
  margin-bottom:20px;
}

label{
  display:block;
  margin-bottom:6px;
  color:var(--muted);
  font-size:14px;
}

input,select{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid var(--line);
  background:rgba(255,255,255,0.05);
  color:#fff;
  outline:none;
}

/* BUTTON */
.btn{
  width:100%;
  margin-top:20px;
  background:var(--lime);
  color:#000;
  padding:16px;
  border:none;
  border-radius:10px;
  font-family:'Barlow Condensed';
  font-weight:700;
  font-size:16px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

.btn::after{
  content:'';
  position:absolute;
  left:-100%;
  top:0;
  width:100%;
  height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
  transition:.4s;
}

.btn:hover::after{
  left:100%;
}
</style>
</head>

<body>

<nav>
  <div style="color:var(--lime);font-family:'Bebas Neue';font-size:26px;">
    Alpha Fitness
  </div>
</nav>

<div class="container">

  <h1>Monte sua Dieta</h1>
  <p class="sub">Leva menos de 30 segundos</p>

  <form class="form-box" id="form">

    <div class="input-group">
      <label>Peso (kg)</label>
      <input type="number" id="peso" required>
    </div>

    <div class="input-group">
      <label>Objetivo</label>
      <select id="objetivo">
        <option value="emagrecer">Emagrecer</option>
        <option value="hipertrofia">Hipertrofia</option>
        <option value="manter">Manter</option>
      </select>
    </div>

    <div class="input-group">
      <label>Disponibilidade diária</label>
      <select id="tempo">
        <option>30min</option>
        <option>1h</option>
        <option>2h+</option>
      </select>
    </div>

    <div class="input-group">
      <label>Disposição</label>
      <select id="disposicao">
        <option>Baixa</option>
        <option>Média</option>
        <option>Alta</option>
      </select>
    </div>

    <button class="btn">Gerar Dieta</button>

  </form>

</div>

<script>
/* ANIMAÇÃO */
setTimeout(()=>{
  document.querySelector(".form-box").classList.add("show");
},200);

/* SUBMIT */
document.getElementById("form").addEventListener("submit",function(e){
  e.preventDefault();

  const dados = {
    peso: document.getElementById("peso").value,
    objetivo: document.getElementById("objetivo").value,
    tempo: document.getElementById("tempo").value,
    disposicao: document.getElementById("disposicao").value
  };

  localStorage.setItem("dadosUsuario", JSON.stringify(dados));

  window.location.href = "dieta.html";
});
</script>

</body>
</html>
