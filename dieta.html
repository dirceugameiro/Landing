<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sua Dieta - Alpha Fitness</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --lime:#b5f23d;
  --white:#fff;
  --muted:rgba(255,255,255,0.6);
  --line:rgba(255,255,255,0.1);
  --bg:#080a0e;
}

body{
  font-family:'DM Sans',sans-serif;
  color:var(--white);
  background:
  linear-gradient(rgba(0,0,0,0.85),rgba(0,0,0,0.95)),
  url('https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=1800') center/cover;
  min-height:100vh;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  padding:20px 60px;
  display:flex;
  justify-content:space-between;
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  z-index:10;
}

/* CONTAINER */
.container{
  padding:140px 60px 80px;
  max-width:1100px;
  margin:auto;
}

/* TITLE */
h1{
  font-family:'Bebas Neue';
  font-size:70px;
  margin-bottom:10px;
}

.sub{
  color:var(--muted);
  margin-bottom:40px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

/* CARD (SCROLL REVEAL PREMIUM) */
.card{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--line);
  border-radius:16px;
  padding:25px;
  backdrop-filter:blur(12px);

  opacity:0;
  transform:translateY(40px) scale(0.98);
  transition:
    opacity .8s cubic-bezier(.16,1,.3,1),
    transform .8s cubic-bezier(.16,1,.3,1);
}

.card.show{
  opacity:1;
  transform:translateY(0) scale(1);
}

.card:hover{
  transform:translateY(-6px) scale(1.02);
  border-color:rgba(181,242,61,0.3);
}

.card h3{
  color:var(--lime);
  margin-bottom:10px;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:40px;
  background:var(--lime);
  color:#000;
  padding:16px 30px;
  border-radius:10px;
  text-decoration:none;
  font-family:'Barlow Condensed';
  font-weight:700;
  letter-spacing:1px;
  position:relative;
  overflow:hidden;
}

.btn::after{
  content:'';
  position:absolute;
  left:-100%;
  top:0;
  width:100%;
  height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
  transition:.4s;
}

.btn:hover::after{
  left:100%;
}

/* WHATS FLOAT */
.whats{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25d366;
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
}
</style>
</head>

<body>

<nav>
  <div style="color:var(--lime);font-family:'Bebas Neue';font-size:26px;">
    Alpha Fitness
  </div>
</nav>

<div class="container">

  <h1>Sua Dieta Personalizada</h1>
  <p class="sub">Baseada no seu objetivo e rotina</p>

  <div class="grid" id="dietContent"></div>

  <a id="whatsBtn" class="btn">Falar com Personal</a>

</div>

<div class="whats">💬</div>

<script>
/* =========================
   DADOS DO USUÁRIO
========================= */
const dados = JSON.parse(localStorage.getItem("dadosUsuario")) || {};

const peso = parseFloat(dados.peso) || 70;
const objetivo = dados.objetivo || "manter";
const tempo = dados.tempo || "1h";
const disposicao = dados.disposicao || "Média";

/* =========================
   LÓGICA INTELIGENTE
========================= */

// quantidade de proteína baseada no objetivo
let proteinaBase = 0;

if(objetivo === "hipertrofia") proteinaBase = 2.2;
if(objetivo === "emagrecer") proteinaBase = 1.8;
if(objetivo === "manter") proteinaBase = 1.5;

// ajuste por disposição
if(disposicao === "Alta") proteinaBase += 0.2;
if(disposicao === "Baixa") proteinaBase -= 0.2;

// cálculo final
const proteinaTotal = Math.round(peso * proteinaBase);

/* ajuste de carboidrato */
let carbNivel = "moderado";

if(objetivo === "hipertrofia") carbNivel = "alto";
if(objetivo === "emagrecer") carbNivel = "baixo";

if(tempo === "2h+") carbNivel = "alto";
if(tempo === "30min" && objetivo !== "hipertrofia") carbNivel = "baixo";

/* =========================
   DIETA DINÂMICA
========================= */

function gerarDieta(){
  return [
    {
      titulo:"Café da manhã",
      desc:`
      ${proteinaTotal/4}g proteína → ovos
      + carbo ${carbNivel === "alto" ? "alto (aveia + banana)" : "controlado"}
      + café sem açúcar
      `
    },

    {
      titulo:"Almoço",
      desc:`
      Proteína forte (frango/carne)
      + carbo ${carbNivel}
      + legumes e salada
      `
    },

    {
      titulo:"Lanche",
      desc:`
      ${disposicao === "Alta" ? "Whey + banana + aveia" : "Iogurte + frutas"}
      `
    },

    {
      titulo:"Jantar",
      desc:`
      ${objetivo === "emagrecer" ? "baixo carbo + proteína leve" :
        objetivo === "hipertrofia" ? "refeição completa com carbo" :
        "refeição equilibrada"}
      `
    }
  ];
}

/* =========================
   RENDER
========================= */

const container = document.getElementById("dietContent");

const dietaFinal = gerarDieta();

dietaFinal.forEach((item)=>{
  container.innerHTML += `
    <div class="card">
      <h3>${item.titulo}</h3>
      <p>${item.desc}</p>
    </div>
  `;
});

/* =========================
   SCROLL REVEAL
========================= */

const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
},{ threshold:0.15 });

document.querySelectorAll(".card").forEach((el, i)=>{
  el.style.transitionDelay = (i * 0.08) + "s";
  observer.observe(el);
});

/* =========================
   WHATSAPP PERSONALIZADO
========================= */

const numero = "5567999999999"; // TROCAR

const msg = encodeURIComponent(
`Olá! Fiz minha dieta no site.

📊 Dados:
Peso: ${peso}kg
Objetivo: ${objetivo}
Tempo: ${tempo}
Disposição: ${disposicao}

Quero acompanhamento profissional.`
);

document.getElementById("whatsBtn").href =
  `https://wa.me/${numero}?text=${msg}`;
</script>

</body>
</html>
